    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root { --bg-primary: #0a0c0e; --bg-secondary: #1a1e22; --card-bg: #24292f; --accent: #ff6046; --accent-hover: #ff7a60; --text-primary: #f0f3f8; --text-secondary: #b0b7c5; --border-radius: 16px; --transition: all 0.25s ease; }

        .header { background: var(--bg-secondary); padding: 1rem 2rem; box-shadow: 0 4px 30px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,96,70,0.3); }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .menu-btn { background: transparent; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; transition: var(--transition); line-height: 1; padding: 0 0.5rem; }
        .menu-btn:hover { color: var(--accent); }
        .logo { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), #ffaa70); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; cursor: pointer; }
        .logo i { margin-right: 0.5rem; color: var(--accent); -webkit-text-fill-color: initial; }
        .search-bar { background: var(--bg-primary); border-radius: 40px; padding: 0.5rem 1.5rem; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); transition: var(--transition); width: 300px; }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,96,70,0.2); }
        .search-bar i { color: var(--text-secondary); margin-right: 0.75rem; }
        .search-bar input { background: transparent; border: none; outline: none; color: var(--text-primary); width: 100%; font-size: 1rem; }
        .search-bar input::placeholder { color: var(--text-secondary); }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; flex: 1; }
        .category-title { font-size: 2rem; margin: 2rem 0 1.5rem; color: var(--accent); border-bottom: 2px solid rgba(255,96,70,0.3); padding-bottom: 0.5rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1rem; }
        .hero-card { background: var(--card-bg); border-radius: var(--border-radius); overflow: visible; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.4); transition: var(--transition); border: 1px solid rgba(255,255,255,0.05); text-align: center; padding: 1rem 0.5rem; position: relative; }
        .hero-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255,96,70,0.2); border-color: var(--accent); }
        .hero-card__image { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 0.5rem; border: 2px solid transparent; transition: var(--transition); }
        .hero-card:hover .hero-card__image { border-color: var(--accent); }
        .hero-card__name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .hero-card .tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); border: 1px solid var(--accent); border-radius: 8px; padding: 0.5rem; width: 180px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: opacity 0.2s, visibility 0.2s; z-index: 10; pointer-events: none; margin-bottom: 8px; }

        .tooltip .roles { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
        .tooltip .difficulty { display: flex; justify-content: center; gap: 0.2rem; color: #ffc107; font-size: 0.9rem; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--bg-secondary); border-right: 1px solid rgba(255,96,70,0.3); box-shadow: 2px 0 10px rgba(0,0,0,0.5); transition: left 0.3s ease; z-index: 1000; padding: 1rem; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h3 { color: var(--accent); }
        .close-sidebar { background: transparent; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
        .close-sidebar:hover { color: var(--accent); }
        .accordion-item { margin-bottom: 0.5rem; }
        .accordion-header { background: rgba(255,96,70,0.2); padding: 0.75rem; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; border: 1px solid rgba(255,96,70,0.3); transition: var(--transition); }
        .accordion-header:hover { background: rgba(255,96,70,0.3); }
        .accordion-header i { transition: transform 0.3s; }
        .accordion-header.active i { transform: rotate(90deg); }
        .accordion-content { display: none; padding: 0.5rem 0; }
        .accordion-content.active { display: block; }
        .hero-list { list-style: none; }
        .hero-list-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem; border-radius: 8px; cursor: pointer; transition: var(--transition); margin-bottom: 0.25rem; }
        .hero-list-item:hover { background: rgba(255,96,70,0.2); }
        .hero-list-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .hero-list-item span { flex: 1; font-weight: 500; }
        .favorite-icon { color: var(--text-secondary); cursor: pointer; font-size: 1.2rem; transition: var(--transition); }
        .favorite-icon.active { color: #ffc107; }
        .favorite-icon:hover { transform: scale(1.1); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-secondary); border-radius: var(--border-radius); max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.7); border: 1px solid rgba(255,96,70,0.3); animation: modalFadeIn 0.3s; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .modal-header__image { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 10px 20px rgba(255,96,70,0.3); }
        .modal-header__info h2 { font-size: 2.5rem; font-weight: 700; }
        .modal-close { margin-left: auto; background: transparent; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; transition: var(--transition); }
        .modal-close:hover { color: var(--accent); transform: rotate(90deg); }
        .modal-body { padding: 2rem; }
        .section-title { font-size: 1.5rem; margin: 2rem 0 1.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--accent); }
        .section-title i { font-size: 1.8rem; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .item-card { background: var(--card-bg); border-radius: 16px; padding: 1.2rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); position: relative; }
        .item-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .item-card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 0.75rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .item-card span { display: block; font-weight: 600; }
        .item-price { font-size: 0.9rem; color: #ffd700; margin-top: 0.25rem; }
        .item-alt { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; font-style: italic; }
        .skills-order { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1.5rem 0; justify-content: center; }
        .skill-icon { background: var(--card-bg); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .tips-text { background: rgba(255,96,70,0.1); border-left: 4px solid var(--accent); padding: 1.5rem; border-radius: 12px; font-style: italic; margin: 1.5rem 0; }
        .footer { background: var(--bg-secondary); padding: 2rem; text-align: center; border-top: 1px solid rgba(255,96,70,0.2); margin-top: 3rem; }

        .gallery-prev:hover, .gallery-next:hover { background: var(--accent-hover); }

        ];

        // Объединяем всех героев
        const heroes = [...strHeroes, ...agiHeroes, ...intHeroes, ...uniHeroes];

        // ==================== ИЗБРАННОЕ ====================
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        function saveFavorites() { localStorage.setItem('favorites', JSON.stringify(favorites)); }
        function toggleFavorite(heroId) {
            favorites = favorites.includes(heroId) ? favorites.filter(id => id !== heroId) : [...favorites, heroId];
            saveFavorites();
            renderHeroListAll();
            renderHeroListFav();
        }
        function isFavorite(heroId) { return favorites.includes(heroId); }

        // ==================== РЕНДЕР КАРТОЧЕК ====================
        function renderHeroGrid(containerId, heroArray) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            heroArray.forEach(hero => {
                const stars = Array(5).fill(0).map((_, i) => `<i class="fas fa-star${i < (hero.difficulty || 1) ? '' : '-o'}"></i>`).join('');
                const card = document.createElement('div');
                card.className = 'hero-card';
                card.innerHTML = `
                    <img src="${hero.image}" alt="${hero.name}" class="hero-card__image" loading="lazy" onerror="this.src='https://via.placeholder.com/90?text=Hero'">
                    <div class="hero-card__name">${hero.fullName}</div>
                    <div class="tooltip"><div class="roles">${hero.roles.join(', ')}</div><div class="difficulty">${stars}</div></div>
                `;
                card.addEventListener('click', () => openModal(hero));
                container.appendChild(card);
            });
        }

        // ==================== РЕНДЕР СПИСКОВ В МЕНЮ ====================
        function renderHeroListAll() {
            const list = document.getElementById('heroListAll');
            list.innerHTML = '';
            heroes.forEach(hero => {
                const li = document.createElement('li');
                li.className = 'hero-list-item';
                li.innerHTML = `<img src="${hero.image}" alt="${hero.name}" onerror="this.src='https://via.placeholder.com/40?text=Hero'"><span>${hero.fullName}</span><i class="fas fa-star favorite-icon ${isFavorite(hero.id) ? 'active' : ''}" data-id="${hero.id}"></i>`;
                li.addEventListener('click', (e) => { if (!e.target.classList.contains('favorite-icon')) openModal(hero); });
                li.querySelector('.favorite-icon').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(hero.id); });
                list.appendChild(li);
            });
        }

        function renderHeroListFav() {
            const list = document.getElementById('heroListFav');
            list.innerHTML = '';
            favorites.forEach(id => {
                const hero = heroes.find(h => h.id === id);
                if (!hero) return;
                const li = document.createElement('li');
                li.className = 'hero-list-item';
                li.innerHTML = `<img src="${hero.image}" alt="${hero.name}" onerror="this.src='https://via.placeholder.com/40?text=Hero'"><span>${hero.fullName}</span><i class="fas fa-star favorite-icon active" data-id="${hero.id}"></i>`;
                li.addEventListener('click', (e) => { if (!e.target.classList.contains('favorite-icon')) openModal(hero); });
                li.querySelector('.favorite-icon').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(hero.id); });
                list.appendChild(li);
            });
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        function openModal(hero) {
            document.getElementById('modalHeroImage').src = hero.image;
            document.getElementById('modalHeroName').textContent = hero.fullName;
            document.getElementById('modalHeroRoles').innerHTML = hero.roles.map(r => `<span class="role-tag">${r}</span>`).join('');
            const body = document.getElementById('modalBody');
            
            // Базовый HTML для гайда
            let guideHTML = '';
            if (hero.guide && hero.guide.earlyItems) {
                guideHTML = `
                    <div class="section-title"><i class="fas fa-backpack"></i> Начало игры</div><div class="items-grid">${hero.guide.earlyItems.map(i => `<div class="item-card"><img src="${i.icon}" alt="${i.name}"><span>${i.name}</span><div class="item-price">💰 ${i.price} зол.</div>${i.alt ? `<div class="item-alt">🔄 Замена: ${i.alt}</div>` : ''}</div>`).join('')}</div>
                    <div class="section-title"><i class="fas fa-clock"></i> Середина игры</div><div class="items-grid">${hero.guide.midItems.map(i => `<div class="item-card"><img src="${i.icon}" alt="${i.name}"><span>${i.name}</span><div class="item-price">💰 ${i.price} зол.</div>${i.alt ? `<div class="item-alt">🔄 Замена: ${i.alt}</div>` : ''}</div>`).join('')}</div>
                    <div class="section-title"><i class="fas fa-crown"></i> Конец игры</div><div class="items-grid">${hero.guide.lateItems.map(i => `<div class="item-card"><img src="${i.icon}" alt="${i.name}"><span>${i.name}</span><div class="item-price">💰 ${i.price} зол.</div>${i.alt ? `<div class="item-alt">🔄 Замена: ${i.alt}</div>` : ''}</div>`).join('')}</div>
                    <div class="section-title"><i class="fas fa-magic"></i> Порядок прокачки скиллов</div><div class="skills-order">${hero.guide.skills.map((s, idx) => `<div class="skill-icon" title="${s}">${idx+1}</div>`).join('')}</div><p style="text-align:center;color:var(--text-secondary);margin-bottom:2rem;">${hero.guide.skills.join(' → ')}</p>
                    <div class="section-title"><i class="fas fa-lightbulb"></i> Как играть</div><div class="tips-text">${hero.guide.tips}</div>
                `;
            } else {
                guideHTML = '<p style="text-align:center; padding: 2rem;">Гайд для этого героя пока не добавлен. Вы можете помочь, заполнив его!</p>';
            }

            // Специальный блок для Invoker
            if (hero.id === 'invoker') {
                guideHTML += `
                    <div class="section-title"><i class="fas fa-meteor"></i> Комбинации сфер</div>
                    <div class="invoker-combo">
                        <div class="combo-grid">
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability2.jpg?1588075375" alt="Quas"><span>QQQ</span><small> Cold Snap</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability3.jpg?1588075388" alt="Wex"><span>WWW</span><small> EMP</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability4.jpg?1588075400" alt="Exort"><span>EEE</span><small> Sun Strike</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability2.jpg?1588075375" alt="Quas"><span>QQW</span><small> Ghost Walk</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability3.jpg?1588075388" alt="Wex"><span>WWQ</span><small> Tornado</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability4.jpg?1588075400" alt="Exort"><span>EEQ</span><small> Forge Spirit</small></div>
                            <div class="combo-item"><img src="https://dota2.ru/img/heroes/invoker/ability2.jpg?1588075375" alt="Quas"><span>QWE</span><small> Deafening Blast</small></div>
                        </div>
                    </div>
                `;
            }

            body.innerHTML = guideHTML;
            document.getElementById('heroModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ==================== ЗАКРЫТИЕ МОДАЛКИ ====================
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('heroModal').classList.remove('active');
            document.body.style.overflow = '';
        });
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('heroModal')) { document.getElementById('heroModal').classList.remove('active'); document.body.style.overflow = ''; } });
        document.getElementById('logo').addEventListener('click', () => location.reload());

        // ==================== ГАЛЕРЕЯ ZXC ====================
        const zxcBtn = document.getElementById('zxcBtn');
        const galleryModal = document.getElementById('galleryModal');
        const closeGallery = document.getElementById('closeGalleryModal');
        const prevBtn = document.getElementById('galleryPrev');
        const nextBtn = document.getElementById('galleryNext');
        const slides = document.querySelectorAll('.gallery-slide');
        let currentSlide = 0;

        function showSlide(index) {
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
        }

        zxcBtn.addEventListener('click', () => {
            galleryModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        closeGallery.addEventListener('click', () => {
            galleryModal.classList.remove('active');
            document.body.style.overflow = '';
        });

        window.addEventListener('click', (e) => {
            if (e.target === galleryModal) {
                galleryModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        prevBtn.addEventListener('click', () => {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(currentSlide);
        });

        nextBtn.addEventListener('click', () => {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        });

        // ==================== МЕНЮ-БУРГЕР И АККОРДЕОН ====================
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeSidebar = document.getElementById('closeSidebar');
        menuToggle.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        closeSidebar.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });

        const allHeader = document.getElementById('allHeroesHeader');
        const favHeader = document.getElementById('favoritesHeader');
        const allContent = document.getElementById('allHeroesContent');
        const favContent = document.getElementById('favoritesContent');
        allHeader.addEventListener('click', () => { allContent.classList.toggle('active'); allHeader.classList.toggle('active'); });
        favHeader.addEventListener('click', () => { favContent.classList.toggle('active'); favHeader.classList.toggle('active'); });
        allContent.classList.add('active'); favContent.classList.add('active'); allHeader.classList.add('active'); favHeader.classList.add('active');

        // ==================== ПОИСК ====================
        document.querySelector('.search-bar input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.hero-card').forEach(card => {
                const name = card.querySelector('.hero-card__name').textContent.toLowerCase();
                card.style.display = name.includes(term) ? '' : 'none';
            });
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        renderHeroGrid('heroGridStr', strHeroes);
        renderHeroGrid('heroGridAgi', agiHeroes);
        renderHeroGrid('heroGridInt', intHeroes);
        renderHeroGrid('heroGridUni', uniHeroes);
        renderHeroListAll();
        renderHeroListFav();
    </script>
</body>
</html>
